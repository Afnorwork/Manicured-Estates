<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#2D5016">
<title>Manicured Estates</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --green-dark: #2D5016;
    --green-med: #4A7C2F;
    --green-light: #7AB648;
    --green-pale: #EAF4E2;
    --gold: #C8A951;
    --gold-light: #F5E6B8;
    --orange: #E8640A;
    --red: #C0392B;
    --white: #FAFDF7;
    --gray: #8A9B7E;
    --gray-light: #E8EDE4;
    --text: #1A2A0E;
    --cash-bg: #FFF3E0;
    --cash-border: #E8640A;
    --biweek-bg: #E8F4FD;
    --biweek-border: #2980B9;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--green-dark);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ── Header ── */
  .app-header {
    background: var(--green-dark);
    padding: 16px 20px 12px;
    position: sticky;
    top: 0;
    z-index: 100;
    border-bottom: 2px solid var(--green-med);
  }
  .header-top {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 8px;
  }
  .app-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 22px;
    letter-spacing: 2px;
    color: var(--gold);
  }
  .header-date {
    font-size: 12px;
    color: var(--gray);
    font-weight: 500;
    letter-spacing: 0.5px;
  }
  .day-tabs {
    display: flex;
    gap: 6px;
    overflow-x: auto;
    scrollbar-width: none;
    padding-bottom: 2px;
  }
  .day-tabs::-webkit-scrollbar { display: none; }
  .day-tab {
    flex-shrink: 0;
    padding: 6px 14px;
    border-radius: 20px;
    border: 1.5px solid var(--green-med);
    background: transparent;
    color: var(--gray);
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.2s;
  }
  .day-tab.active {
    background: var(--gold);
    border-color: var(--gold);
    color: var(--green-dark);
    font-weight: 600;
  }
  .day-tab.today-indicator {
    border-color: var(--green-light);
    color: var(--green-light);
  }

  /* ── Main content ── */
  .main {
    background: var(--white);
    min-height: calc(100vh - 110px);
    border-radius: 20px 20px 0 0;
    padding: 16px 0 100px;
  }

  /* ── Day header ── */
  .day-header {
    padding: 12px 20px 8px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    border-bottom: 1px solid var(--gray-light);
    margin-bottom: 8px;
  }
  .day-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 28px;
    letter-spacing: 1.5px;
    color: var(--green-dark);
    line-height: 1;
  }
  .week-badge {
    background: var(--biweek-bg);
    border: 1.5px solid var(--biweek-border);
    color: #1a5276;
    font-size: 11px;
    font-weight: 600;
    padding: 4px 10px;
    border-radius: 12px;
    letter-spacing: 0.5px;
  }
  .progress-bar {
    height: 4px;
    background: var(--gray-light);
    margin: 0 20px 12px;
    border-radius: 2px;
    overflow: hidden;
  }
  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--green-med), var(--green-light));
    border-radius: 2px;
    transition: width 0.4s ease;
  }
  .progress-text {
    padding: 0 20px 8px;
    font-size: 12px;
    color: var(--gray);
    font-weight: 500;
  }

  /* ── Stop cards ── */
  .stop-card {
    margin: 8px 16px;
    border-radius: 14px;
    border: 2px solid var(--gray-light);
    background: #fff;
    overflow: hidden;
    transition: all 0.25s ease;
    box-shadow: 0 1px 4px rgba(0,0,0,0.06);
  }
  .stop-card.done {
    border-color: var(--green-light);
    background: var(--green-pale);
    opacity: 0.75;
  }
  .stop-card.skipped {
    border-color: var(--gray);
    background: var(--gray-light);
    opacity: 0.6;
  }
  .stop-card.cash {
    border-color: var(--cash-border);
    background: var(--cash-bg);
  }
  .stop-card.biweek {
    border-color: var(--biweek-border);
    background: var(--biweek-bg);
  }
  .stop-card.unbilled {
    border-color: var(--gray);
    background: #f9f9f9;
  }

  .stop-header {
    padding: 14px 16px 10px;
    display: flex;
    align-items: flex-start;
    gap: 12px;
    cursor: pointer;
  }
  .stop-number {
    width: 28px;
    height: 28px;
    border-radius: 50%;
    background: var(--green-dark);
    color: var(--gold);
    font-family: 'Bebas Neue', sans-serif;
    font-size: 15px;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    margin-top: 1px;
  }
  .stop-card.done .stop-number { background: var(--green-light); color: white; }
  .stop-card.skipped .stop-number { background: var(--gray); color: white; }
  .stop-card.cash .stop-number { background: var(--orange); color: white; }
  .stop-card.unbilled .stop-number { background: var(--gray); color: white; }

  .stop-info { flex: 1; min-width: 0; }
  .stop-name {
    font-size: 17px;
    font-weight: 600;
    color: var(--text);
    line-height: 1.2;
    margin-bottom: 3px;
  }
  .stop-card.done .stop-name { text-decoration: line-through; color: var(--gray); }

  .stop-meta {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
    align-items: center;
  }
  .meta-badge {
    font-size: 11px;
    font-weight: 500;
    padding: 2px 8px;
    border-radius: 8px;
    letter-spacing: 0.3px;
  }
  .badge-service { background: var(--green-pale); color: var(--green-dark); }
  .badge-price { background: var(--gold-light); color: #7A5A00; font-weight: 600; }
  .badge-biweek { background: var(--biweek-bg); color: #1a5276; border: 1px solid var(--biweek-border); }
  .badge-cash { background: var(--cash-bg); color: var(--orange); border: 1px solid var(--cash-border); }
  .badge-unbilled { background: #f0f0f0; color: var(--gray); }
  .badge-note { background: #FFF8E1; color: #8B6914; font-style: italic; }

  .stop-status-icon {
    font-size: 22px;
    flex-shrink: 0;
    margin-top: 2px;
  }

  /* ── Action buttons ── */
  .stop-actions {
    padding: 0 16px 14px;
    display: flex;
    gap: 8px;
  }
  .btn {
    flex: 1;
    padding: 11px 8px;
    border-radius: 10px;
    border: none;
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.15s;
    letter-spacing: 0.3px;
  }
  .btn:active { transform: scale(0.97); }
  .btn-done {
    background: var(--green-med);
    color: white;
  }
  .btn-done:active { background: var(--green-dark); }
  .btn-skip {
    background: var(--gray-light);
    color: var(--gray);
    flex: 0.6;
  }
  .btn-details {
    background: var(--gold-light);
    color: #7A5A00;
    flex: 0.6;
  }
  .btn-undo {
    background: var(--gray-light);
    color: var(--text);
    font-size: 13px;
  }

  /* ── Details panel ── */
  .stop-details {
    padding: 0 16px 14px;
    border-top: 1px solid var(--gray-light);
    display: none;
  }
  .stop-details.open { display: block; }
  .detail-row {
    display: flex;
    gap: 10px;
    margin-top: 10px;
    align-items: center;
  }
  .detail-label {
    font-size: 12px;
    font-weight: 600;
    color: var(--gray);
    width: 80px;
    flex-shrink: 0;
    letter-spacing: 0.3px;
    text-transform: uppercase;
  }
  .detail-input {
    flex: 1;
    padding: 8px 12px;
    border-radius: 8px;
    border: 1.5px solid var(--gray-light);
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    color: var(--text);
    background: var(--white);
    transition: border-color 0.2s;
  }
  .detail-input:focus {
    outline: none;
    border-color: var(--green-med);
  }
  .detail-input.price-input { font-weight: 600; color: var(--green-dark); }

  /* ── Monday flex ── */
  .monday-section {
    padding: 0 16px;
  }
  .monday-add-btn {
    width: 100%;
    padding: 14px;
    border-radius: 14px;
    border: 2px dashed var(--green-med);
    background: transparent;
    color: var(--green-med);
    font-family: 'DM Sans', sans-serif;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    margin-bottom: 12px;
    transition: all 0.2s;
    letter-spacing: 0.3px;
  }
  .monday-add-btn:active { background: var(--green-pale); }

  .monday-entry {
    background: #fff;
    border: 2px solid var(--gray-light);
    border-radius: 14px;
    padding: 14px 16px;
    margin-bottom: 10px;
  }
  .monday-entry select, .monday-entry input, .monday-entry textarea {
    width: 100%;
    padding: 8px 12px;
    border-radius: 8px;
    border: 1.5px solid var(--gray-light);
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    margin-top: 6px;
    background: var(--white);
    color: var(--text);
  }
  .monday-entry label {
    font-size: 11px;
    font-weight: 600;
    color: var(--gray);
    text-transform: uppercase;
    letter-spacing: 0.4px;
  }
  .entry-field { margin-bottom: 8px; }
  .monday-remove {
    background: none;
    border: none;
    color: var(--red);
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    padding: 4px 0;
    margin-top: 4px;
  }

  /* ── Sync button ── */
  .sync-bar {
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    background: var(--green-dark);
    padding: 12px 20px 20px;
    display: flex;
    gap: 10px;
    align-items: center;
    border-top: 2px solid var(--green-med);
    z-index: 200;
  }
  .sync-btn {
    flex: 1;
    padding: 14px;
    border-radius: 12px;
    border: none;
    background: var(--gold);
    color: var(--green-dark);
    font-family: 'Bebas Neue', sans-serif;
    font-size: 18px;
    letter-spacing: 1.5px;
    cursor: pointer;
    transition: all 0.2s;
  }
  .sync-btn:active { transform: scale(0.98); background: #B8993D; }
  .sync-btn.syncing { background: var(--green-med); color: white; }
  .sync-btn.success { background: var(--green-light); color: white; }
  .sync-btn.error { background: var(--red); color: white; }
  .resend-btn {
    padding: 14px 12px;
    border-radius: 12px;
    border: 1.5px solid var(--green-med);
    background: transparent;
    color: var(--gray);
    font-family: 'Bebas Neue', sans-serif;
    font-size: 13px;
    letter-spacing: 1px;
    cursor: pointer;
    transition: all 0.2s;
    flex-shrink: 0;
  }
  .resend-btn:active { background: var(--green-med); color: white; }

  .summary-pill {
    background: var(--green-med);
    border-radius: 10px;
    padding: 8px 14px;
    text-align: center;
  }
  .summary-pill .pill-num {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 20px;
    color: var(--gold);
    line-height: 1;
  }
  .summary-pill .pill-label {
    font-size: 10px;
    color: var(--gray);
    font-weight: 500;
    letter-spacing: 0.3px;
  }

  /* ── Toast ── */
  .toast {
    position: fixed;
    top: 120px;
    left: 50%;
    transform: translateX(-50%) translateY(-20px);
    background: var(--green-dark);
    color: var(--gold);
    padding: 10px 20px;
    border-radius: 20px;
    font-size: 14px;
    font-weight: 600;
    opacity: 0;
    transition: all 0.3s;
    z-index: 300;
    pointer-events: none;
    white-space: nowrap;
    border: 1px solid var(--green-med);
  }
  .toast.show {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
  }

  /* ── Extra work items ── */
  .extra-work-list { margin-top: 10px; }
  .extra-work-item {
    display: flex;
    gap: 8px;
    align-items: center;
    flex-wrap: wrap;
    margin-bottom: 8px;
    background: var(--green-pale);
    border-radius: 10px;
    padding: 8px 10px;
    border: 1px solid #c5e0b0;
  }
  .extra-work-item select {
    flex: 1.6;
    padding: 7px 10px;
    border-radius: 8px;
    border: 1.5px solid var(--gray-light);
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    background: white;
    color: var(--text);
  }
  .extra-work-item input[type="number"] {
    flex: 0.7;
    padding: 7px 10px;
    border-radius: 8px;
    border: 1.5px solid var(--gray-light);
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    font-weight: 600;
    color: var(--green-dark);
    background: white;
    min-width: 0;
  }
  .extra-work-item input[type="text"] {
    flex: 1 1 100%;
    padding: 7px 10px;
    border-radius: 8px;
    border: 1.5px solid var(--gray-light);
    font-family: 'DM Sans', sans-serif;
    font-size: 12px;
    color: var(--text);
    background: white;
  }
  .extra-remove-btn {
    background: none;
    border: none;
    color: var(--red);
    font-size: 18px;
    cursor: pointer;
    padding: 0 2px;
    flex-shrink: 0;
    line-height: 1;
  }
  .add-extra-btn {
    width: 100%;
    padding: 8px;
    border-radius: 8px;
    border: 1.5px dashed var(--green-med);
    background: transparent;
    color: var(--green-med);
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    margin-top: 6px;
    transition: background 0.2s;
  }
  .add-extra-btn:active { background: var(--green-pale); }
  .detail-section-label {
    font-size: 11px;
    font-weight: 600;
    color: var(--gray);
    text-transform: uppercase;
    letter-spacing: 0.4px;
    margin-top: 12px;
    margin-bottom: 2px;
    display: block;
  }

  .day-tab.schedule-tab {
    background: var(--green-dark);
    border-color: var(--gold);
    color: var(--gold);
    font-weight: 700;
    letter-spacing: 1px;
  }
  .day-tab.schedule-tab.active {
    background: var(--gold);
    color: var(--green-dark);
  }

  .day-tab.clients-tab {
    background: var(--green-dark);
    border-color: var(--gray);
    color: var(--gray);
    font-weight: 600;
    letter-spacing: 0.5px;
  }
  .day-tab.clients-tab.active {
    background: var(--gray);
    color: white;
    border-color: var(--gray);
  }

  /* ── Clients panel ── */
  .clients-panel { padding: 0 16px; }
  .clients-section-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 18px;
    letter-spacing: 1px;
    color: var(--green-dark);
    padding: 4px 0 10px;
    border-bottom: 2px solid var(--gray-light);
    margin-bottom: 14px;
  }
  .client-manage-card {
    background: #fff;
    border: 2px solid var(--gray-light);
    border-radius: 12px;
    padding: 12px 14px;
    margin-bottom: 8px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 10px;
  }
  .client-manage-info { flex: 1; min-width: 0; }
  .client-manage-name {
    font-size: 14px;
    font-weight: 600;
    color: var(--text);
  }
  .client-manage-day {
    font-size: 11px;
    color: var(--gray);
    margin-top: 2px;
  }
  .client-remove-btn {
    background: none;
    border: 1.5px solid var(--gray-light);
    border-radius: 8px;
    color: var(--red);
    font-size: 12px;
    font-weight: 600;
    padding: 6px 10px;
    cursor: pointer;
    flex-shrink: 0;
    transition: all 0.2s;
  }
  .client-remove-btn:active { background: var(--red); color: white; }
  .client-add-form {
    background: #fff;
    border: 2px solid var(--gold);
    border-radius: 16px;
    padding: 16px;
    margin-bottom: 14px;
  }
  .client-add-form .form-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 17px;
    letter-spacing: 1px;
    color: var(--green-dark);
    margin-bottom: 12px;
  }
  .schedule-job-panel {
    padding: 0 16px;
  }
  .schedule-job-form {
    background: #fff;
    border: 2px solid var(--gold);
    border-radius: 16px;
    padding: 18px 16px;
    margin-bottom: 14px;
  }
  .schedule-job-form .form-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 18px;
    letter-spacing: 1px;
    color: var(--green-dark);
    margin-bottom: 14px;
  }
  .schedule-field {
    margin-bottom: 12px;
  }
  .schedule-field label {
    font-size: 11px;
    font-weight: 600;
    color: var(--gray);
    text-transform: uppercase;
    letter-spacing: 0.4px;
    display: block;
    margin-bottom: 5px;
  }
  .schedule-field input,
  .schedule-field select,
  .schedule-field textarea {
    width: 100%;
    padding: 10px 14px;
    border-radius: 10px;
    border: 1.5px solid var(--gray-light);
    font-family: 'DM Sans', sans-serif;
    font-size: 15px;
    background: var(--white);
    color: var(--text);
    transition: border-color 0.2s;
  }
  .schedule-field input:focus,
  .schedule-field select:focus,
  .schedule-field textarea:focus {
    outline: none;
    border-color: var(--green-med);
  }
  .schedule-field textarea {
    resize: none;
    height: 80px;
  }
  .schedule-add-btn {
    width: 100%;
    padding: 14px;
    border-radius: 12px;
    border: none;
    background: var(--gold);
    color: var(--green-dark);
    font-family: 'Bebas Neue', sans-serif;
    font-size: 18px;
    letter-spacing: 1.5px;
    cursor: pointer;
    transition: all 0.2s;
    margin-top: 4px;
  }
  .schedule-add-btn:active { background: #B8993D; transform: scale(0.98); }

  /* ── Upcoming jobs list ── */
  .upcoming-section-label {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 16px;
    letter-spacing: 1px;
    color: var(--green-dark);
    padding: 4px 0 10px;
    border-bottom: 2px solid var(--gray-light);
    margin-bottom: 12px;
  }
  .upcoming-job-card {
    background: #fff;
    border: 2px solid var(--gold-light);
    border-radius: 12px;
    padding: 12px 14px;
    margin-bottom: 10px;
    display: flex;
    align-items: flex-start;
    gap: 12px;
    box-shadow: 0 1px 4px rgba(0,0,0,0.05);
  }
  .upcoming-day-badge {
    background: var(--green-dark);
    color: var(--gold);
    font-family: 'Bebas Neue', sans-serif;
    font-size: 13px;
    padding: 4px 10px;
    border-radius: 8px;
    flex-shrink: 0;
    letter-spacing: 1px;
    margin-top: 2px;
  }
  .upcoming-job-info { flex: 1; min-width: 0; }
  .upcoming-job-name {
    font-size: 15px;
    font-weight: 600;
    color: var(--text);
    margin-bottom: 3px;
  }
  .upcoming-job-desc {
    font-size: 12px;
    color: var(--gray);
    font-style: italic;
  }
  .upcoming-job-remove {
    background: none;
    border: none;
    color: var(--gray);
    font-size: 20px;
    cursor: pointer;
    padding: 0;
    line-height: 1;
    flex-shrink: 0;
  }
  .upcoming-job-remove:active { color: var(--red); }
  .no-upcoming {
    text-align: center;
    padding: 40px 20px;
    color: var(--gray);
    font-size: 14px;
  }
  .no-upcoming .icon { font-size: 36px; margin-bottom: 8px; }

  /* ── One-off stop card indicator ── */
  .stop-card.oneoff {
    border-color: var(--gold);
    background: var(--gold-light);
  }
  .stop-card.oneoff .stop-number {
    background: var(--gold);
    color: var(--green-dark);
  }
  /* ── Job line items in schedule form ── */
  .job-line-items { margin-top: 8px; }
  .job-line-item {
    display: flex;
    gap: 8px;
    align-items: center;
    margin-bottom: 8px;
  }
  .job-line-item input[type="text"] {
    flex: 2;
    padding: 9px 12px;
    border-radius: 10px;
    border: 1.5px solid var(--gray-light);
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    background: var(--white);
    color: var(--text);
  }

])].sort();

// ── State ─────────────────────────────────────────────────────────────────
let state = {

  stopStates: {},

// ── Date helpers ──────────────────────────────────────────────────────────
function getToday() {
  const d = new Date();
  const days = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
  return days[d.getDay()];
}

function getWedWeek() {
  // Week A = odd ISO week numbers, Week B = even
  const d = new Date();
  const startOfYear = new Date(d.getFullYear(), 0, 1);
  const weekNum = Math.ceil(((d - startOfYear) / 86400000 + startOfYear.getDay() + 1) / 7);
  return weekNum % 2 === 1 ? 'A' : 'B';
}

function formatDate(d) {
  return d.toLocaleDateString('en-US', { weekday:'long', month:'short', day:'numeric', year:'numeric' });
}

function getTodayStr() {
  const d = new Date();
  return `${(d.getMonth()+1).toString().padStart(2,'0')}/${d.getDate().toString().padStart(2,'0')}/${d.getFullYear()}`;
}

// Get the Monday of the current week (week anchor)
function getWeekStart() {
  const d = new Date();
  d.setHours(0,0,0,0);
  const day = d.getDay(); // 0=Sun, 1=Mon...
  const diff = day === 0 ? -6 : 1 - day; // go back to Monday
  d.setDate(d.getDate() + diff);
  return d;
}

function getWeekKey() {
  const d = getWeekStart();
  return `week_${d.getFullYear()}_${(d.getMonth()+1).toString().padStart(2,'0')}_${d.getDate().toString().padStart(2,'0')}`;
}

// Get the actual date of a day name within the CURRENT week (Mon-Sun)
function getCurrentWeekDate(dayName) {
  const dayIndex = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'].indexOf(dayName);
  const weekStart = getWeekStart(); // Monday
  const diff = dayIndex === 0 ? 6 : dayIndex - 1; // Mon=0 offset, Sun=6 offset
  const d = new Date(weekStart);
  d.setDate(d.getDate() + diff);
  return d;
}

// Is a given day name in the past this week?
function isDayPast(dayName) {
  const dayDate = getCurrentWeekDate(dayName);
  const today = new Date(); today.setHours(0,0,0,0);
  return dayDate < today;
}

// Is today Sunday? (reset day)
function isSunday() {
  return new Date().getDay() === 0;
}

// Get the date of a given day name within the next N weeks
function getDateForDay(dayName, weeksAhead) {
  const dayIndex = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'].indexOf(dayName);
  const d = new Date();
  d.setHours(0,0,0,0);
  let diff = dayIndex - d.getDay();
  if (diff < 0) diff += 7;
  if (diff === 0 && weeksAhead === 0) diff = 0;
  d.setDate(d.getDate() + diff + (weeksAhead * 7));
  return d;
}

function formatShort(d) {
  return d.toLocaleDateString('en-US', { month:'short', day:'numeric' });
}

// Build a list of upcoming day+date options for the next 4 weeks
function getUpcomingDayOptions() {
  const options = [];
  const today = new Date(); today.setHours(0,0,0,0);
  for (let w = 0; w <= 4; w++) {
    DAYS.forEach(dayName => {
      const d = getDateForDay(dayName, w);
      if (d >= today) {
        const label = w === 0
          ? `${dayName} — This week (${formatShort(d)})`
          : w === 1
          ? `${dayName} — Next week (${formatShort(d)})`
          : `${dayName} — ${formatShort(d)}`;
        const value = `${dayName}||${d.toISOString().split('T')[0]}`;
        options.push({ label, value, day: dayName, date: d });
      }
    });
  }
  return options;
}

// Get the date string for a specific route day in the current week
function getRouteDayDate(dayName) {
  return formatShort(getCurrentWeekDate(dayName));
}

// ── Stop key helper ───────────────────────────────────────────────────────
function stopKey(day, stopName, idx) {
  return `${day}_${idx}_${stopName}`;
}

// ── Get active stops for a day ────────────────────────────────────────────
function getStops(day) {
  const sched = SCHEDULE[day];
  if (!sched) return [];
  const removed = state.removedClients || [];
  const overrides = state.priceOverrides || {};
  let stops = [];
  if (sched.type === 'route') stops = [...sched.stops];
  else if (sched.type === 'split') {
    const week = state.wedWeek || getWedWeek();
    stops = week === 'A' ? [...sched.weekA.stops] : [...sched.weekB.stops];
  }
  // Apply price overrides to hardcoded stops
  stops = stops.map(s => {
    if (overrides[s.name] !== undefined) {
      return { ...s, price: overrides[s.name] };
    }
    return s;
  });
  // Add new clients assigned to this day
  (state.newClients || []).forEach(nc => {
    if (nc.day === day && !stops.some(s => s.name === nc.name) && !removed.includes(nc.name)) {
      const price = overrides[nc.name] !== undefined ? overrides[nc.name] : (nc.mte || 0);
      stops.push({
        name: nc.name,
        service: 'MTE',
        price: price,
        freq: nc.freq || 'weekly',
        billing: true,
        note: nc.address || '',
      });
    }
  });
  return stops.filter(s => !removed.includes(s.name));
}

// ── Init ──────────────────────────────────────────────────────────────────
function init() {
  const today = getToday();
  state.wedWeek = getWedWeek();
  state.activeDay = DAYS.includes(today) ? today : 'Tuesday';

  // Load saved state for this week
  const saved = localStorage.getItem(getWeekKey());
  if (saved) {
    try {
      const parsed = JSON.parse(saved);
      state.stopStates = parsed.stopStates || {};
      state.mondayEntries = parsed.mondayEntries || [];
    } catch(e) {}
  }
  // Load scheduled jobs — try sheet first, fall back to localStorage
  const savedJobs = localStorage.getItem('me_scheduled_jobs');
  if (savedJobs) {
    try { state.scheduledJobs = JSON.parse(savedJobs) || []; } catch(e) {}
  }
  // Then try to load from sheet in background (more up to date)
  loadJobsFromSheet();
  // Load removed clients (persists permanently)
  const savedRemoved = localStorage.getItem('me_removed_clients');
  if (savedRemoved) {
    try { state.removedClients = JSON.parse(savedRemoved) || []; } catch(e) {}
  }
  // Load new clients
  const savedNew = localStorage.getItem('me_new_clients');
  if (savedNew) {
    try {
      state.newClients = JSON.parse(savedNew) || [];
      // Add any new clients to ALL_CLIENTS
      state.newClients.forEach(c => {
        if (!ALL_CLIENTS.includes(c.name)) { ALL_CLIENTS.push(c.name); }
      });
      ALL_CLIENTS.sort();
    } catch(e) {}
  }
  // Then try to load from sheet in background (more up to date)
  loadClientsFromSheet();

  // Load completed jobs archive
  const savedCompleted = localStorage.getItem('me_completed_jobs');
  if (savedCompleted) {
    try { state.completedJobs = JSON.parse(savedCompleted) || []; } catch(e) {}
  }

  // Load archived job IDs (prevents zombie repopulation from sheet)
  const savedArchived = localStorage.getItem('me_archived_job_ids');
  if (savedArchived) {
    try {
      const raw = JSON.parse(savedArchived) || [];
      // Support both old format (plain ID strings) and new format ({id, ts})
      // Auto-expire entries older than 48 hours
      const now = Date.now();
      const MAX_AGE = 48 * 60 * 60 * 1000; // 48 hours
      state.archivedJobIds = raw.filter(entry => {
        if (typeof entry === 'object' && entry.ts) {
          return (now - entry.ts) < MAX_AGE;
        }
        // Old format without timestamp — discard so blocked jobs can repopulate
        return false;
      });
      // Save cleaned list back
      localStorage.setItem('me_archived_job_ids', JSON.stringify(state.archivedJobIds));
    } catch(e) {}
  }

  // Load price overrides
  const savedPrices = localStorage.getItem('me_price_overrides');
  if (savedPrices) {
    try { state.priceOverrides = JSON.parse(savedPrices) || {}; } catch(e) {}
  }

  renderHeader();
  renderTabs();
  renderDay(state.activeDay);
}

function saveState() {
  localStorage.setItem(getWeekKey(), JSON.stringify({
    stopStates: state.stopStates,
    mondayEntries: state.mondayEntries
  }));
  localStorage.setItem('me_scheduled_jobs', JSON.stringify(state.scheduledJobs));
  localStorage.setItem('me_removed_clients', JSON.stringify(state.removedClients));
  localStorage.setItem('me_new_clients', JSON.stringify(state.newClients));
  localStorage.setItem('me_completed_jobs', JSON.stringify(state.completedJobs));
  localStorage.setItem('me_archived_job_ids', JSON.stringify(state.archivedJobIds));
  localStorage.setItem('me_price_overrides', JSON.stringify(state.priceOverrides));
}

// ── Render header ─────────────────────────────────────────────────────────
function renderHeader() {
  document.getElementById('headerDate').textContent = formatDate(new Date());
}

// ── Render tabs ───────────────────────────────────────────────────────────
function renderTabs() {
  const today = getToday();
  const container = document.getElementById('dayTabs');
  const dayButtons = DAYS.map(day => {
    const isActive = day === state.activeDay;
    const isToday = day === today;
    const isPast = DAYS.includes(day) && isDayPast(day);
    const jobCount = state.scheduledJobs.filter(j => j.day === day).length;
    const dot = jobCount > 0 ? ` <span style="display:inline-block;width:7px;height:7px;border-radius:50%;background:var(--gold);margin-left:3px;vertical-align:middle;"></span>` : '';
    let tabClass = `day-tab ${isActive ? 'active' : ''} ${isToday && !isActive ? 'today-indicator' : ''}`;
    let extraStyle = isPast && !isActive ? 'opacity:0.55;' : '';
    return `<button class="${tabClass}" style="${extraStyle}" onclick="switchDay('${day}')">${day}${dot}</button>`;
  }).join('');
  const schedActive = state.activeDay === 'Schedule';
  const totalJobs = state.scheduledJobs.length;
  const schedButton = `<button class="day-tab schedule-tab ${schedActive ? 'active' : ''}"
    onclick="switchDay('Schedule')">📋 Jobs${totalJobs > 0 ? ' ('+totalJobs+')' : ''}</button>`;
  const clientsActive = state.activeDay === 'Clients';
  const clientsButton = `<button class="day-tab clients-tab ${clientsActive ? 'active' : ''}"
    onclick="switchDay('Clients')">⚙️ Clients</button>`;
  container.innerHTML = dayButtons + schedButton + clientsButton;
}

function switchDay(day) {
  state.activeDay = day;
  renderTabs();
  renderDay(day);
}

// ── Render day ─────────────────────────────────────────────────────────────
function renderDay(day) {
  const sched = SCHEDULE[day];
  const main = document.getElementById('mainContent');
  const isPast = DAYS.includes(day) && isDayPast(day);

  if (day === 'Schedule') {
    renderSchedulePanel(main);
    updateSummary();
    return;
  }

  if (day === 'Clients') {
    renderClientsPanel(main);
    updateSummary();
    return;
  }

  if (day === 'Monday') {
    renderMonday(main, isPast);
    updateSummary();
    return;
  }

  const stops = getStops(day);
  let wedLabel = '';
  if (day === 'Wednesday') {
    const week = state.wedWeek || getWedWeek();
    wedLabel = `<span class="week-badge">WEEK ${week} — ${week === 'A' ? 'MOOSE GROUP' : 'WINTER GROUP'}</span>
      <button onclick="toggleWedWeek()" style="background:none;border:none;color:var(--gray);font-size:12px;cursor:pointer;margin-left:6px;">switch</button>`;
  }

  const doneCount = stops.filter((_,i) => (state.stopStates[stopKey(day,stops[i].name,i)]?.status === 'done')).length;
  const pct = stops.length ? Math.round(doneCount/stops.length*100) : 0;

  const pastBanner = isPast ? `
    <div style="margin:0 16px 10px;padding:8px 14px;background:var(--gray-light);border-radius:10px;
      border-left:3px solid var(--gray);font-size:12px;color:var(--gray);font-weight:500;">
      📋 ${day} ${getRouteDayDate(day)} — week history (read only)
    </div>` : '';

  let html = `
    <div class="day-header">
      <div class="day-title">${day}</div>
      <div style="display:flex;flex-direction:column;align-items:flex-end;gap:4px">
        <span style="font-size:12px;color:${isPast ? 'var(--gray)' : 'var(--gray)'};font-weight:600;">${getRouteDayDate(day)}</span>
        <div>${wedLabel}</div>
      </div>
    </div>
    <div class="progress-bar"><div class="progress-fill" style="width:${pct}%"></div></div>
    <div class="progress-text">${doneCount} of ${stops.length} stops complete</div>
    ${pastBanner}
  `;

  stops.forEach((stop, idx) => {
    const key = stopKey(day, stop.name, idx);
    const ss = state.stopStates[key] || {};
    const status = ss.status || 'pending';
    const actualPrice = ss.actualPrice !== undefined ? ss.actualPrice : stop.price;
    const extraWork = ss.extraWork || [];
    const notes = ss.notes || '';
    const detailsOpen = ss.detailsOpen || false;

    let cardClass = '';
    if (status === 'done') cardClass = 'done';
    else if (status === 'skipped') cardClass = 'skipped';
    else if (stop.cash) cardClass = 'cash';
    else if (stop.unbilled) cardClass = 'unbilled';
    else if (stop.freq === 'biweek') cardClass = 'biweek';

    let statusIcon = '';
    if (status === 'done') statusIcon = '✅';
    else if (status === 'skipped') statusIcon = '⏭️';
    else statusIcon = stop.cash ? '💵' : stop.unbilled ? '🏠' : '';

    let badges = `<span class="meta-badge badge-service">${stop.service}</span>`;
    if (stop.billing && stop.price > 0) badges += `<span class="meta-badge badge-price">$${actualPrice}</span>`;
    if (stop.freq === 'biweek') badges += `<span class="meta-badge badge-biweek">2-week</span>`;
    if (stop.cash) badges += `<span class="meta-badge badge-cash">💵 Cash</span>`;
    if (!stop.billing && !stop.cash) badges += `<span class="meta-badge badge-unbilled">No charge</span>`;
    if (stop.note) badges += `<span class="meta-badge badge-note">${stop.note}</span>`;

    let actions = '';
    if (isPast) {
      // Read-only — just show status, no buttons
      actions = '';
    } else if (status === 'pending') {
      actions = `
        <div class="stop-actions">
          <button class="btn btn-done" onclick="markDone('${day}','${stop.name}',${idx})">✓ Done</button>
          <button class="btn btn-details" onclick="toggleDetails('${day}','${stop.name}',${idx})">+ Details</button>
          <button class="btn btn-skip" onclick="markSkipped('${day}','${stop.name}',${idx})">Skip</button>
        </div>`;
    } else {
      actions = `
        <div class="stop-actions">
          <button class="btn btn-undo" onclick="markPending('${day}','${stop.name}',${idx})">↩ Undo</button>
        </div>`;
    }

    const detailsClass = detailsOpen ? 'open' : '';
    const details = `
      <div class="stop-details ${detailsClass}" id="details_${key.replace(/[^a-zA-Z0-9]/g,'_')}">
        <div class="detail-row">
          <div class="detail-label">Price</div>
          <input type="number" class="detail-input price-input" placeholder="$${stop.price}"
            value="${actualPrice || ''}" step="0.01"
            onchange="updateStopField('${day}','${stop.name}',${idx},'actualPrice',this.value)"
            inputmode="decimal">
        </div>
        <span class="detail-section-label">Extra Work Done</span>
        <div class="extra-work-list" id="extra_${key.replace(/[^a-zA-Z0-9]/g,'_')}">
          ${extraWork.map((ew, ei) => `
            <div class="extra-work-item">
              <select onchange="updateExtraWork('${day}','${stop.name}',${idx},${ei},'service',this.value)">
                ${EXTRA_SERVICES.map(s => `<option ${ew.service===s?'selected':''}>${s}</option>`).join('')}
              </select>
              <input type="number" placeholder="$0" value="${ew.price||''}" inputmode="decimal" step="0.01"
                onchange="updateExtraWork('${day}','${stop.name}',${idx},${ei},'price',this.value)">
              <button class="extra-remove-btn" onclick="removeExtraWork('${day}','${stop.name}',${idx},${ei})">×</button>
              <input type="text" placeholder="Description (e.g. Fixed sprinklers NE corner)" value="${ew.desc||''}"
                onchange="updateExtraWork('${day}','${stop.name}',${idx},${ei},'desc',this.value)">
            </div>`).join('')}
        </div>
        <button class="add-extra-btn" onclick="addExtraWork('${day}','${stop.name}',${idx})">+ Add Extra Work</button>
        <div class="detail-row">
          <div class="detail-label">Notes</div>
          <input type="text" class="detail-input" placeholder="Any notes..."
            value="${notes}"
            onchange="updateStopField('${day}','${stop.name}',${idx},'notes',this.value)">
        </div>
      </div>`;

    html += `
      <div class="stop-card ${cardClass}" id="card_${key.replace(/[^a-zA-Z0-9]/g,'_')}">
        <div class="stop-header" onclick="toggleDetails('${day}','${stop.name}',${idx})">
          <div class="stop-number">${idx+1}</div>
          <div class="stop-info">
            <div class="stop-name">${stop.name}</div>
            <div class="stop-meta">${badges}</div>
          </div>
          <div class="stop-status-icon">${statusIcon}</div>
        </div>
        ${details}
        ${actions}
      </div>`;
  });

  // Append any one-off scheduled jobs for this day
  const oneOffJobs = state.scheduledJobs.filter(j => j.day === day);
  oneOffJobs.forEach((job, ji) => {
    const key = `oneoff_${job.id}`;
    const ss = state.stopStates[key] || {};
    const status = ss.status || 'pending';
    const stopNum = stops.length + ji + 1;
    const detailsOpen = ss.detailsOpen || false;
    let cardClass = status === 'done' ? 'done' : status === 'skipped' ? 'skipped' : 'oneoff';
    let statusIcon = status === 'done' ? '✅' : status === 'skipped' ? '⏭️' : '📋';

    // Use live line items from stopState if edited, else fall back to job.lineItems
    const lineItems = ss.liveLineItems || job.lineItems || [];
    const totalPrice = lineItems.reduce((s, li) => s + (parseFloat(li.price)||0), 0);

    const detailsPanel = detailsOpen ? `
      <div style="padding:0 16px 12px;border-top:1px solid var(--gray-light);padding-top:10px;">
        <span class="detail-section-label">Line Items</span>
        <div id="oneoff_lines_${job.id}">
          ${lineItems.map((li, li_i) => `
            <div class="job-line-item">
              <input type="text" placeholder="Service description" value="${li.desc}"
                oninput="updateOneOffLineItem('${job.id}','${day}',${li_i},'desc',this.value)">
              <input type="number" placeholder="$0" value="${li.price||''}" inputmode="decimal" step="0.01"
                oninput="updateOneOffLineItem('${job.id}','${day}',${li_i},'price',this.value)">
              <button class="job-line-remove" onclick="removeOneOffLineItem('${job.id}','${day}',${li_i})">×</button>
            </div>`).join('')}
        </div>
        <button class="add-line-item-btn" onclick="addOneOffLineItem('${job.id}','${day}')">+ Add Line Item</button>
        ${totalPrice > 0 ? `<div style="text-align:right;font-size:13px;font-weight:600;color:var(--green-dark);margin-top:8px;">Total: $${totalPrice.toFixed(2)}</div>` : ''}
      </div>` : '';

    let actions = '';
    if (status === 'pending') {
      actions = `<div class="stop-actions">
        <button class="btn btn-done" onclick="markOneOffDone('${job.id}','${day}')">✓ Done</button>
        <button class="btn btn-details" onclick="toggleOneOffDetails('${job.id}','${day}')">+ Details</button>
        <button class="btn btn-skip" onclick="markOneOffSkipped('${job.id}','${day}')">Skip</button>
      </div>`;
    } else {
      actions = `<div class="stop-actions">
        <button class="btn btn-undo" onclick="markOneOffPending('${job.id}','${day}')">↩ Undo</button>
        ${status === 'done' ? `<button class="btn btn-details" style="font-size:12px;flex:0.5" onclick="removeScheduledJob('${job.id}')">✕ Remove</button>` : ''}
      </div>`;
    }
    html += `
      <div class="stop-card ${cardClass}" id="card_oneoff_${job.id}">
        <div class="stop-header" onclick="toggleOneOffDetails('${job.id}','${day}')">
          <div class="stop-number">${stopNum}</div>
          <div class="stop-info">
            <div class="stop-name">${job.nameInfo}</div>
            <div class="stop-meta">
              <span class="meta-badge badge-note">📋 One-off job</span>
              ${job.scheduledDate ? `<span class="meta-badge badge-biweek">${formatScheduledDate(job.scheduledDate)}</span>` : ''}
              ${totalPrice > 0 ? `<span class="meta-badge badge-price">$${totalPrice.toFixed(2)}</span>` : ''}
            </div>
          </div>
          <div class="stop-status-icon">${statusIcon}</div>
        </div>
        ${detailsPanel}
        ${actions}
      </div>`;
  });

  main.innerHTML = html;
  updateSummary();
}

// ── Clients panel ────────────────────────────────────────────────────────
function renderClientsPanel(main) {
  // Build current route per day (excluding locally removed clients)
  const removed = state.removedClients || [];
  const routeByDay = {};
  const overrides = state.priceOverrides || {};
  DAYS.forEach(day => {
    const sched = SCHEDULE[day];
    if (!sched || sched.type === 'flex') { routeByDay[day] = []; return; }
    let stops = [];
    if (sched.type === 'route') stops = [...sched.stops];
    if (sched.type === 'split') {
      stops = [...new Map([
        ...sched.weekA.stops.map(s => [s.name, s]),
        ...sched.weekB.stops.map(s => [s.name, s])
      ]).values()];
    }
    // Apply price overrides
    stops = stops.map(s => overrides[s.name] !== undefined ? { ...s, price: overrides[s.name] } : s);
    // Include new clients assigned to this day
    (state.newClients || []).forEach(nc => {
      if (nc.day === day && !stops.some(s => s.name === nc.name)) {
        const price = overrides[nc.name] !== undefined ? overrides[nc.name] : (nc.mte||0);
        stops.push({ name: nc.name, service: 'MTE', price: price, freq: nc.freq||'weekly', billing: true });
      }
    });
    routeByDay[day] = stops.filter(s => !removed.includes(s.name) && !s.unbilled && !s.cash);
  });

  // Build route client cards grouped by day
  const routeHtml = DAYS.filter(d => d !== 'Monday').map(day => {
    const stops = routeByDay[day];
    if (!stops.length) return '';
    const dayHeader = `<div style="font-family:'Bebas Neue',sans-serif;font-size:15px;letter-spacing:1px;
      color:var(--green-med);margin:14px 0 6px;padding-left:2px;">${day}</div>`;
    const cards = stops.map(stop => {
      const escapedName = stop.name.replace(/'/g, "\\'");
      const uid = stop.name.replace(/[^a-zA-Z0-9]/g, '_');
      const currentPrice = (state.priceOverrides || {})[stop.name] !== undefined
        ? state.priceOverrides[stop.name] : stop.price;
      return `
      <div class="client-manage-card" style="flex-wrap:wrap;">
        <div class="client-manage-info" style="flex:1;min-width:0;">
          <div class="client-manage-name">${stop.name}</div>
          <div class="client-manage-day">${stop.freq === 'biweek' ? 'Every 2 weeks' : 'Weekly'}</div>
        </div>
        <div style="display:flex;align-items:center;gap:4px;flex-shrink:0;">
          <span style="font-size:11px;color:var(--gray);font-weight:600;">MTE $</span>
          <input type="number" value="${currentPrice}" step="0.01" inputmode="decimal"
            onchange="updateClientPrice('${escapedName}',this.value)"
            style="width:58px;padding:5px 6px;border-radius:8px;border:1.5px solid var(--gray-light);
            font-family:'DM Sans',sans-serif;font-size:13px;font-weight:600;color:var(--green-dark);
            background:#fff;text-align:center;">
        </div>
        <div style="display:flex;gap:6px;flex-shrink:0;margin-top:6px;">
          <select onchange="moveClientToDay('${escapedName}','${day}',this.value)" style="
            padding:5px 6px;border-radius:8px;border:1.5px solid var(--gray-light);font-family:'DM Sans',sans-serif;
            font-size:11px;color:var(--gray);background:#fff;font-weight:600;max-width:80px;">
            <option value="">Move...</option>
            ${DAYS.filter(d => d !== 'Monday' && d !== day).map(d => `<option value="${d}">${d}</option>`).join('')}
          </select>
          <button class="client-remove-btn" onclick="removeClientFromRoute('${escapedName}','${day}')">Remove</button>
        </div>
      </div>`;
    }).join('');
    return dayHeader + cards;
  }).join('');

  // Removed clients section built after trulyRemoved is calculated below

  // Build full client roster — everyone known, with their current assignment status
  const allAssigned = new Set();
  DAYS.filter(d => d !== 'Monday').forEach(day => {
    (routeByDay[day] || []).forEach(s => allAssigned.add(s.name));
  });
  // Build the full list from ALL_CLIENTS + newClients
  const fullRoster = ALL_CLIENTS.map(name => {
    const nc = (state.newClients || []).find(c => c.name === name);
    const isInRemovedList = removed.includes(name);
    // A client is "pooled" (unassigned) if they're in removedClients but have a newClient entry with oncall
    const isPooled = isInRemovedList && nc && (nc.day === 'oncall' || !nc.day);
    // Only truly removed if in the removed list AND not pooled back
    const isRemoved = isInRemovedList && !isPooled;
    // Figure out which day they're on (if any)
    let assignedDay = '';
    if (!isRemoved) {
      DAYS.filter(d => d !== 'Monday').forEach(day => {
        if ((routeByDay[day] || []).some(s => s.name === name)) assignedDay = day;
      });
    }
    return { name, assignedDay, isRemoved, isPooled, isNew: !!nc, address: nc ? nc.address : '' };
  });

  const unassignedClients = fullRoster.filter(c => !c.assignedDay && !c.isRemoved);
  const assignedClients = fullRoster.filter(c => c.assignedDay && !c.isRemoved);
  // Only show truly removed clients (not pooled ones)
  const trulyRemoved = removed.filter(name => {
    const nc = (state.newClients || []).find(c => c.name === name);
    return !(nc && (nc.day === 'oncall' || !nc.day));
  });

  // Removed clients section (with restore option)
  let removedHtml = '';
  if (trulyRemoved.length > 0) {
    removedHtml = `
      <div class="clients-section-title" style="margin-top:18px;">Removed Clients (${trulyRemoved.length})</div>
      ${trulyRemoved.map(name => {
        const escapedName = name.replace(/'/g, "\\'");
        return `
        <div class="client-manage-card" style="border-color:var(--gray-light);opacity:0.7;">
          <div class="client-manage-info">
            <div class="client-manage-name" style="text-decoration:line-through;color:var(--gray);">${name}</div>
          </div>
          <button onclick="restoreClient('${escapedName}')" style="
            background:none;border:1.5px solid var(--green-med);border-radius:8px;color:var(--green-med);
            font-size:12px;font-weight:600;padding:6px 10px;cursor:pointer;flex-shrink:0;">Restore</button>
        </div>`;
      }).join('')}`;
  }

  const rosterHtml = `
    <div id="clientRosterPanel" style="display:none;">
      <div class="clients-section-title" style="margin-top:4px;">Unassigned Clients (${unassignedClients.length})</div>
      ${unassignedClients.length === 0 ? '<div style="color:var(--gray);font-size:13px;padding:8px 0;">Everyone is on a route day.</div>' :
        unassignedClients.map(c => {
          const escapedName = c.name.replace(/'/g, "\\'");
          const uid = c.name.replace(/[^a-zA-Z0-9]/g, '_');
          return `
          <div class="client-manage-card" style="flex-wrap:wrap;">
            <div class="client-manage-info" style="width:100%;margin-bottom:8px;">
              <div class="client-manage-name">${c.name}</div>
              ${c.address ? `<div class="client-manage-day">${c.address}</div>` : ''}
              <div class="client-manage-day" style="color:var(--orange);">Not on a route day</div>
            </div>
            <div style="display:flex;gap:6px;width:100%;align-items:center;">
              <input type="number" id="mte_${uid}" placeholder="$ MTE" inputmode="decimal" step="0.01" style="
                width:70px;padding:7px 8px;border-radius:8px;border:1.5px solid var(--gray-light);font-family:'DM Sans',sans-serif;
                font-size:13px;font-weight:600;color:var(--green-dark);background:#fff;">
              <select id="day_${uid}" style="
                flex:1;padding:7px 8px;border-radius:8px;border:1.5px solid var(--gray-light);font-family:'DM Sans',sans-serif;
                font-size:12px;color:var(--gray);background:#fff;font-weight:600;">
                <option value="">Day...</option>
                ${DAYS.filter(d => d !== 'Monday').map(d => `<option value="${d}">${d}</option>`).join('')}
              </select>
              <button onclick="assignClientToDayWithPrice('${escapedName}','${uid}')" style="
                padding:7px 12px;border-radius:8px;border:none;background:var(--gold);color:var(--green-dark);
                font-family:'DM Sans',sans-serif;font-size:12px;font-weight:600;cursor:pointer;flex-shrink:0;">Assign</button>
            </div>
          </div>`;
        }).join('')}

      <div class="clients-section-title" style="margin-top:14px;">All Assigned Clients (${assignedClients.length})</div>
      ${assignedClients.map(c => {
        return `
        <div class="client-manage-card" style="opacity:0.8;">
          <div class="client-manage-info">
            <div class="client-manage-name">${c.name}</div>
            <div class="client-manage-day" style="color:var(--green-med);">${c.assignedDay}</div>
          </div>
          <span class="meta-badge badge-service" style="flex-shrink:0;">✓ On route</span>
        </div>`;
      }).join('')}
    </div>`;

  main.innerHTML = `
    <div class="day-header">
      <div class="day-title">Clients</div>
      <button onclick="toggleClientRoster()" style="background:none;border:1.5px solid var(--gold);
        border-radius:10px;color:var(--gold);font-family:'DM Sans',sans-serif;font-size:12px;
        font-weight:600;padding:5px 12px;cursor:pointer;letter-spacing:0.3px;">📋 Full Roster</button>
    </div>
    <div class="clients-panel">
      ${rosterHtml}

      <div class="client-add-form">
        <div class="form-title">+ Add New Client</div>
        <div class="schedule-field">
          <label>Client Name</label>
          <input type="text" id="nc_name" placeholder="Full name" autocomplete="off">
        </div>
        <div class="schedule-field">
          <label>Billing Address</label>
          <input type="text" id="nc_address" placeholder="Street, City, State ZIP">
        </div>
        <div class="schedule-field">
          <label>Schedule</label>
          <select id="nc_day">
            <option value="oncall">On-Call only (no regular route)</option>
            ${DAYS.filter(d => d !== 'Monday').map(d => `<option value="${d}">${d}</option>`).join('')}
          </select>
        </div>
        <div class="schedule-field">
          <label>Frequency</label>
          <select id="nc_freq">
            <option value="weekly">Weekly</option>
            <option value="biweek">Every 2 Weeks</option>
          </select>
        </div>
        <div class="schedule-field">
          <label>MTE Rate (optional)</label>
          <input type="number" id="nc_mte" placeholder="$0" inputmode="decimal" step="0.01">
        </div>
        <button class="schedule-add-btn" onclick="addNewClient()">SAVE NEW CLIENT</button>
      </div>

      <div class="clients-section-title">Current Route Clients</div>
      ${routeHtml || '<div style="color:var(--gray);font-size:14px;padding:10px 0;">No route clients found.</div>'}
      ${removedHtml}
    </div>`;
}

function removeClientFromRoute(name, day) {
  if (!confirm(`Remove ${name} from ${day}? They'll go back to the unassigned client pool.`)) return;

  // Check if it's a dynamically added newClient
  const existingNew = (state.newClients || []).find(nc => nc.name === name);

  if (existingNew) {
    // Just clear their day — they go back to unassigned pool
    existingNew.day = 'oncall';
  } else {
    // It's a hardcoded SCHEDULE client — we need to hide them from the route
    // but also create a newClient entry so they show in the unassigned pool
    if (!state.removedClients) state.removedClients = [];
    if (!state.removedClients.includes(name)) {
      state.removedClients.push(name);
    }
    // Find their price from the schedule
    const sched = SCHEDULE[day];
    let stopData = null;
    if (sched) {
      if (sched.type === 'route') stopData = sched.stops.find(s => s.name === name);
      if (sched.type === 'split') {
        stopData = sched.weekA.stops.find(s => s.name === name) || sched.weekB.stops.find(s => s.name === name);
      }
    }
    // Add as unassigned newClient so they stay in the pool
    if (!state.newClients) state.newClients = [];
    if (!state.newClients.find(nc => nc.name === name)) {
      state.newClients.push({
        name,
        address: '',
        day: 'oncall',
        mte: stopData ? stopData.price : 0,
        freq: stopData ? stopData.freq : 'weekly',
        added: getTodayStr(),
        unassignedFrom: day,
      });
    }
  }
  saveState();
  syncClientsToSheet();
  renderClientsPanel(document.getElementById('mainContent'));
  renderTabs();
  showToast(`${name} removed from ${day} — back in client pool`);
}

function restoreClient(name) {
  state.removedClients = (state.removedClients || []).filter(n => n !== name);
  saveState();
  renderClientsPanel(document.getElementById('mainContent'));
  showToast(`${name} restored to route`);
}

function updateClientPrice(name, val) {
  const price = parseFloat(val) || 0;
  if (!state.priceOverrides) state.priceOverrides = {};
  state.priceOverrides[name] = price;
  // Also update newClients entry if one exists
  const nc = (state.newClients || []).find(c => c.name === name);
  if (nc) nc.mte = price;
  saveState();
  showToast(`${name} MTE updated to $${price}`);
}

function moveClientToDay(name, fromDay, toDay) {
  if (!toDay) return;
  if (!confirm(`Move ${name} from ${fromDay} to ${toDay}?`)) return;

  // Check if it's a hardcoded SCHEDULE client — if so, remove from old day and add as new client on new day
  // Check if it's already a newClient entry
  const existingNew = (state.newClients || []).find(nc => nc.name === name);

  if (existingNew) {
    // Just update the day on the existing newClient record
    existingNew.day = toDay;
  } else {
    // It's a hardcoded schedule client — remove from old day and add as new client on new day
    // Find the stop data from the schedule
    const sched = SCHEDULE[fromDay];
    let stopData = null;
    if (sched) {
      if (sched.type === 'route') stopData = sched.stops.find(s => s.name === name);
      if (sched.type === 'split') {
        stopData = sched.weekA.stops.find(s => s.name === name) || sched.weekB.stops.find(s => s.name === name);
      }
    }
    // Remove from old day
    if (!state.removedClients) state.removedClients = [];
    if (!state.removedClients.includes(name)) {
      state.removedClients.push(name);
    }
    // Add as new client on new day
    if (!state.newClients) state.newClients = [];
    state.newClients.push({
      name,
      address: '',
      day: toDay,
      mte: stopData ? stopData.price : 0,
      freq: stopData ? stopData.freq : 'weekly',
      added: getTodayStr(),
      movedFrom: fromDay,
    });
  }

  saveState();
  syncClientsToSheet();
  renderClientsPanel(document.getElementById('mainContent'));
  renderTabs();
  showToast(`${name} moved to ${toDay}`);
}

function toggleClientRoster() {
  const panel = document.getElementById('clientRosterPanel');
  if (!panel) return;
  const isOpen = panel.style.display !== 'none';
  panel.style.display = isOpen ? 'none' : 'block';
}

function assignClientToDayWithPrice(name, uid) {
  const dayEl = document.getElementById('day_' + uid);
  const mteEl = document.getElementById('mte_' + uid);
  const day = dayEl ? dayEl.value : '';
  const mte = mteEl ? parseFloat(mteEl.value) || 0 : 0;
  if (!day) { showToast('Pick a day first!'); return; }
  assignClientToDay(name, day, mte);
}

function assignClientToDay(name, day, mte) {
  if (!day) return;
  const price = mte !== undefined ? mte : 0;
  // Check if already a newClient entry (on-call or unassigned)
  const existing = (state.newClients || []).find(nc => nc.name === name);
  if (existing) {
    existing.day = day;
    if (price > 0) existing.mte = price;
  } else {
    // Create a new client entry for this assignment
    if (!state.newClients) state.newClients = [];
    state.newClients.push({
      name,
      address: '',
      day,
      mte: price,
      freq: 'weekly',
      added: getTodayStr(),
    });
  }
  // Make sure they're not in the removed list
  state.removedClients = (state.removedClients || []).filter(n => n !== name);
  saveState();
  syncClientsToSheet();
  renderClientsPanel(document.getElementById('mainContent'));
  renderTabs();
  showToast(`${name} added to ${day} route${price > 0 ? ' at $' + price : ''}`);
}

function addNewClient() {
  const name = document.getElementById('nc_name').value.trim();
  const address = document.getElementById('nc_address').value.trim();
  const day = document.getElementById('nc_day').value;
  const freq = document.getElementById('nc_freq') ? document.getElementById('nc_freq').value : 'weekly';
  const mte = document.getElementById('nc_mte').value.trim();

  if (!name) { showToast('Enter a client name first!'); return; }

  // Add to ALL_CLIENTS dynamically
  if (!ALL_CLIENTS.includes(name)) {
    ALL_CLIENTS.push(name);
    ALL_CLIENTS.sort();
  }

  // Save to new clients list in local storage
  if (!state.newClients) state.newClients = [];
  const newClient = { name, address, day, freq, mte: parseFloat(mte)||0, added: getTodayStr() };
  state.newClients.push(newClient);
  saveState();
  syncClientsToSheet();

  showToast(`${name} added!${day !== 'oncall' ? ' Shows on ' + day + ' route.' : ''}`);
  renderClientsPanel(document.getElementById('mainContent'));
}

// ── Schedule a Job panel ──────────────────────────────────────────────────
function renderSchedulePanel(main) {
  formLineItems = [{ desc: '', price: '' }]; // start with one blank line item
  const jobsByDay = {};
  DAYS.forEach(d => { jobsByDay[d] = state.scheduledJobs.filter(j => j.day === d); });
  const hasJobs = state.scheduledJobs.length > 0;

  const upcomingHtml = hasJobs
    ? DAYS.map(d => {
        const jobs = jobsByDay[d];
        if (!jobs.length) return '';
        return jobs.map(job => {
          // Fix date display — handle both formatted strings and raw ISO dates
          let dateDisplay = formatScheduledDate(job.scheduledDate) || d.slice(0,3).toUpperCase();
          return `
          <div class="upcoming-job-card">
            <div class="upcoming-day-badge">${dateDisplay}</div>
            <div class="upcoming-job-info">
              <div class="upcoming-job-name">${job.nameInfo}</div>
              ${job.jobDesc ? `<div class="upcoming-job-desc">${job.jobDesc}</div>` : ''}
              ${job.lineItems && job.lineItems.length > 0 ? `<div class="upcoming-job-desc">${job.lineItems.map(li => li.desc + (li.price ? ' $'+parseFloat(li.price).toFixed(0) : '')).join(' · ')}</div>` : ''}
            </div>

function toggleCompletedJobs() {

function clearCompletedJobs() {

function formatScheduledDate(dateStr) {
  if (!dateStr) return '';
  // ISO format like 2026-03-25 — convert to readable
  if (/^\d{4}-\d{2}-\d{2}$/.test(dateStr)) {
    const parts = dateStr.split('-');
    const d = new Date(parseInt(parts[0]), parseInt(parts[1])-1, parseInt(parts[2]));
    if (isNaN(d.getTime())) return dateStr;
    return d.toLocaleDateString('en-US', { weekday:'short', month:'short', day:'numeric' });
  }
  // Already a readable formatted string — return as-is
  return dateStr;
}

function toggleCustomName(select) {
  const custom = document.getElementById('sj_name_custom');
  if (!custom) return;
  if (select.value === '__new__') {
    custom.style.display = 'block';
    custom.focus();
  } else {
    custom.style.display = 'none';
  }
}

function addScheduledJob() {
  const select = document.getElementById('sj_name');
  const custom = document.getElementById('sj_name_custom');
  let nameInfo = '';
  if (select.value === '__new__') {
    nameInfo = custom ? custom.value.trim() : '';
  } else {
    nameInfo = select ? select.value.trim() : '';
  }
  if (!nameInfo) { showToast('Select or enter a client name first!'); return; }
  if (formLineItems.length === 0) { showToast('Add at least one line item!'); return; }

  const raw = document.getElementById('sj_day').value;
  const [dayName, isoDate] = raw.includes('||') ? raw.split('||') : [raw, ''];
  const notes = document.getElementById('sj_notes') ? document.getElementById('sj_notes').value.trim() : '';

  // Store raw ISO date only — format on display via formatScheduledDate()
  const scheduledDate = isoDate || '';

  // Validate at least one line item has a description
  const validItems = formLineItems.filter(li => li.desc.trim());
  if (validItems.length === 0) { showToast('Add a description to your line items!'); return; }

  const job = {
    id: Date.now().toString(),
    day: dayName,
    isoDate,
    scheduledDate,
    nameInfo,
    lineItems: validItems.map(li => ({ desc: li.desc.trim(), price: parseFloat(li.price) || 0 })),
    jobDesc: validItems.map(li => li.desc.trim()).join(', '), // summary for badges
    notes,
    createdDate: getTodayStr()
  };
  state.scheduledJobs.push(job);
  formLineItems = [];
  saveState();
  syncJobsToSheet();
  renderTabs();
  renderSchedulePanel(document.getElementById('mainContent'));
  showToast(`Added to ${dayName} ${scheduledDate ? '('+scheduledDate+')' : ''}!`);
}

function removeScheduledJob(id) {
  state.scheduledJobs = state.scheduledJobs.filter(j => j.id !== id);
  delete state.stopStates[`oneoff_${id}`];
  saveState();
  syncJobsToSheet();
  renderTabs();
  if (state.activeDay === 'Schedule') {
    renderSchedulePanel(document.getElementById('mainContent'));
  } else {
    renderDay(state.activeDay);
  }
}

function toggleOneOffDetails(id, day) {
  const key = `oneoff_${id}`;

    const job = state.scheduledJobs.find(j => j.id === id);
    ss.liveLineItems = job && job.lineItems && job.lineItems.length > 0
      ? JSON.parse(JSON.stringify(job.lineItems))

  ss.detailsOpen = !ss.detailsOpen;

  renderDay(day);
}

// ── Summary ───────────────────────────────────────────────────────────────
function updateSummary() {
  const day = state.activeDay;
  if (day === 'Schedule') {
    document.getElementById('doneCount').textContent = state.scheduledJobs.length;
    document.getElementById('billTotal').textContent = '—';
    return;
  }
  if (day === 'Clients') {
    document.getElementById('doneCount').textContent = '—';
    document.getElementById('billTotal').textContent = '—';
    return;
  }
  if (day === 'Monday') {
    let total = state.mondayEntries.reduce((s,e) => s + (parseFloat(e.charge)||0), 0);
    let count = state.mondayEntries.length;
    state.scheduledJobs.filter(j => j.day === 'Monday').forEach(job => {
      const ss = state.stopStates[`oneoff_${job.id}`] || {};
      if (ss.status === 'done') {
        count++;
        const lineItems = ss.liveLineItems || job.lineItems || [];
        lineItems.forEach(li => { total += parseFloat(li.price) || 0; });
      }
    });
    document.getElementById('doneCount').textContent = count;
    document.getElementById('billTotal').textContent = '$' + total.toFixed(0);
    return;
  }
  const stops = getStops(day);
  let done = 0, total = 0;
  stops.forEach((stop, idx) => {
    const key = stopKey(day, stop.name, idx);
    const ss = state.stopStates[key] || {};
    if (ss.status === 'done') {
      done++;
      const price = ss.actualPrice !== undefined ? ss.actualPrice : stop.price;
      if (stop.billing || parseFloat(price) > 0) {
        total += parseFloat(price) || 0;
        (ss.extraWork || []).forEach(ew => { total += parseFloat(ew.price) || 0; });
      }
    }
  });
  // Count completed one-off jobs and add their totals
  state.scheduledJobs.filter(j => j.day === day).forEach(job => {
    const ss = state.stopStates[`oneoff_${job.id}`] || {};
    if (ss.status === 'done') {
      done++;
      const lineItems = ss.liveLineItems || job.lineItems || [];
      lineItems.forEach(li => { total += parseFloat(li.price) || 0; });
    }
  });
  document.getElementById('doneCount').textContent = done;
  document.getElementById('billTotal').textContent = '$' + total.toFixed(0);
}

// ── Sync to Google Sheets ─────────────────────────────────────────────────
const APPS_SCRIPT = 'https://script.google.com/macros/s/AKfycbwlp5l3ielbyo1S6MNo3B3WjiwyAQxge9p33OAaFwWZirCYIxvX-MVt1-79wkPzDtLL/exec';

async function loadJobsFromSheet() {
  try {
    const res = await fetch(APPS_SCRIPT + '?action=getJobs', { method: 'GET', mode: 'cors' });
    const data = await res.json();
    if (data.success && data.jobs) {
      // Validate each job has required fields before accepting it
      const archivedIds = new Set((state.archivedJobIds || []).map(entry =>
        typeof entry === 'object' ? entry.id : entry
      ));
      const validJobs = data.jobs.filter(j =>
        j && j.id && j.day && j.nameInfo &&
        j.lineItems && Array.isArray(j.lineItems) &&
        !archivedIds.has(j.id)
      );
      // Merge: keep any local jobs not on the sheet, add sheet jobs not local
      const localIds = new Set(state.scheduledJobs.map(j => j.id));
      const sheetIds = new Set(validJobs.map(j => j.id));
      // Remove local jobs that the sheet no longer has (they were cleared server-side)
      // But keep any that have a stopState (in-progress/done this session)
      state.scheduledJobs = state.scheduledJobs.filter(j =>
        sheetIds.has(j.id) || state.stopStates[`oneoff_${j.id}`]
      );
      // Add any sheet jobs not already local
      validJobs.forEach(j => {
        if (!localIds.has(j.id)) state.scheduledJobs.push(j);
      });
      localStorage.setItem('me_scheduled_jobs', JSON.stringify(state.scheduledJobs));
      renderTabs();
      if (state.activeDay === 'Schedule') {
        renderSchedulePanel(document.getElementById('mainContent'));
      } else {
        renderDay(state.activeDay);
      }
    }
  } catch(err) {
    // Silently fail — localStorage version is already loaded
  }
}

async function clearSheetJobs() {
  if (!confirm('Clear all scheduled jobs from the sheet and app? This cannot be undone.')) return;
  state.scheduledJobs = [];
  state.archivedJobIds = [];
  localStorage.setItem('me_scheduled_jobs', JSON.stringify([]));
  localStorage.setItem('me_archived_job_ids', JSON.stringify([]));
  saveState();
  try {
    await fetch(APPS_SCRIPT, {
      method: 'POST',
      mode: 'no-cors',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ action: 'saveJobs', jobs: [] })
    });
  } catch(e) {}
  renderTabs();
  renderSchedulePanel(document.getElementById('mainContent'));
  showToast('All scheduled jobs cleared');
}

async function syncJobsToSheet() {
  try {
    await fetch(APPS_SCRIPT, {
      method: 'POST',
      mode: 'no-cors',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ action: 'saveJobs', jobs: state.scheduledJobs })
    });
  } catch(err) {
    // Fail silently — jobs are still in localStorage
  }
}

async function syncClientsToSheet() {
  try {
    await fetch(APPS_SCRIPT, {
      method: 'POST',
      mode: 'no-cors',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ action: 'saveClients', clients: state.newClients })
    });
  } catch(err) {
    // Fail silently — clients are still in localStorage
  }
}

async function loadClientsFromSheet() {
  try {
    const res = await fetch(APPS_SCRIPT + '?action=getClients', { method: 'GET', mode: 'cors' });
    const data = await res.json();
    if (data.success && data.clients && Array.isArray(data.clients)) {
      const validClients = data.clients.filter(c => c && c.name);
      // Merge: keep local clients not on sheet, add sheet clients not local
      const localNames = new Set(state.newClients.map(c => c.name));
      validClients.forEach(sc => {
        if (!localNames.has(sc.name)) {
          state.newClients.push(sc);
        } else {
          // Update local record with sheet data (sheet is source of truth for day/freq/mte)
          const local = state.newClients.find(c => c.name === sc.name);
          if (local && sc.day) local.day = sc.day;
          if (local && sc.freq) local.freq = sc.freq;
          if (local && sc.mte !== undefined) local.mte = sc.mte;
          if (local && sc.address) local.address = sc.address;
        }
      });
      // Update ALL_CLIENTS
      state.newClients.forEach(c => {
        if (!ALL_CLIENTS.includes(c.name)) ALL_CLIENTS.push(c.name);
      });
      ALL_CLIENTS.sort();
      localStorage.setItem('me_new_clients', JSON.stringify(state.newClients));
      // Re-render if on Clients tab
      if (state.activeDay === 'Clients') {
        renderClientsPanel(document.getElementById('mainContent'));
      }
    }
  } catch(err) {
    // Silently fail — localStorage version is already loaded
  }
}

async function syncToSheets() {
  const btn = document.getElementById('syncBtn');
  const day = state.activeDay;
  const today = getTodayStr();

  btn.textContent = 'SAVING...';
  btn.className = 'sync-btn syncing';

  const rows = [];
  const keysToMark = []; // track what we're about to send so we can mark synced after

  if (day === 'Monday') {
    state.mondayEntries.forEach((entry, i) => {
      if ((entry.client || entry.desc) && !entry.synced) {
        rows.push([today, entry.client||entry.type, entry.type,
          parseFloat(entry.charge)||0, parseFloat(entry.materials)||0,
          entry.desc || '', getDayOfWeek(), getYear(), entry.billable||'Yes']);
        keysToMark.push({type: 'monday', idx: i});
      }
    });
    // One-off jobs on Monday
    state.scheduledJobs.filter(j => j.day === 'Monday').forEach(job => {
      const key = `oneoff_${job.id}`;
      const ss = state.stopStates[key] || {};
      if (ss.status === 'done' && !ss.synced) {
        const lineItems = ss.liveLineItems || job.lineItems || [{desc: job.jobDesc || 'One-off Job', price: parseFloat(ss.actualPrice)||0}];
        lineItems.forEach(li => {
          if (li.desc) {
            rows.push([today, job.nameInfo, li.desc,
              parseFloat(li.price)||0, '',
              job.notes || ss.notes || '', getDayOfWeek(), getYear(), 'Yes']);
          }
        });
        keysToMark.push({type: 'stopState', key});
      }
    });
  } else {
    const stops = getStops(day);
    stops.forEach((stop, idx) => {
      const key = stopKey(day, stop.name, idx);
      const ss = state.stopStates[key] || {};
      if (ss.status === 'done' && !ss.synced) {
        const price = ss.actualPrice !== undefined ? ss.actualPrice : stop.price;
        const hasBillableAmount = stop.billing || (parseFloat(price) > 0);
        const hasExtraWork = (ss.extraWork || []).some(ew => ew.service && ew.price);
        if (hasBillableAmount || hasExtraWork) {
          if (parseFloat(price) > 0) {
            rows.push([
              today, stop.name, stop.service,
              parseFloat(price)||0, '',
              ss.notes || '', getDayOfWeek(), getYear(), 'No'
            ]);
          }
          keysToMark.push({type: 'stopState', key});
          // Extra work as separate line items
          (ss.extraWork || []).forEach(ew => {
            if (ew.service && ew.price) {
              rows.push([
                today, stop.name, ew.service,
                parseFloat(ew.price)||0, '',
                ew.desc || '', getDayOfWeek(), getYear(), 'No'
              ]);
            }
          });
        }
      }
    });
    // One-off jobs on route days
    state.scheduledJobs.filter(j => j.day === day).forEach(job => {
      const key = `oneoff_${job.id}`;
      const ss = state.stopStates[key] || {};
      if (ss.status === 'done' && !ss.synced) {
        const lineItems = ss.liveLineItems || job.lineItems || [{desc: job.jobDesc || 'One-off Job', price: parseFloat(ss.actualPrice)||0}];
        lineItems.forEach(li => {
          if (li.desc) {
            rows.push([today, job.nameInfo, li.desc,
              parseFloat(li.price)||0, '',
              job.notes || ss.notes || '', getDayOfWeek(), getYear(), 'Yes']);
          }
        });
        keysToMark.push({type: 'stopState', key});
      }
    });
  }

  if (rows.length === 0) {
    // Check if everything was already synced
    const anySynced = keysToMark.length === 0 && hasSyncedItems(day);
    showToast(anySynced ? 'Already saved — nothing new!' : 'Nothing to save yet!');
    btn.textContent = 'SAVE DAY';
    btn.className = 'sync-btn';
    return;
  }

  try {
    await fetch(APPS_SCRIPT, {
      method: 'POST',
      mode: 'no-cors',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ rows })
    });

    // Mark everything as synced so it won't send again
    const syncedOneOffIds = [];
    keysToMark.forEach(item => {
      if (item.type === 'monday') {
        state.mondayEntries[item.idx].synced = true;
      } else if (item.type === 'stopState') {
        if (!state.stopStates[item.key]) state.stopStates[item.key] = {};
        state.stopStates[item.key].synced = true;
        // Track one-off job IDs that were just synced so we can auto-remove them
        if (item.key.startsWith('oneoff_')) {
          syncedOneOffIds.push(item.key.replace('oneoff_', ''));
        }
      }
    });
    // Archive completed one-off jobs and remove them from the active schedule
    if (syncedOneOffIds.length > 0) {
      if (!state.completedJobs) state.completedJobs = [];
      if (!state.archivedJobIds) state.archivedJobIds = [];
      syncedOneOffIds.forEach(id => {
        const job = state.scheduledJobs.find(j => j.id === id);
        if (job) {
          const ss = state.stopStates[`oneoff_${id}`] || {};
          const lineItems = ss.liveLineItems || job.lineItems || [];
          state.completedJobs.unshift({
            id: job.id,
            nameInfo: job.nameInfo,
            day: job.day,
            scheduledDate: job.scheduledDate,
            lineItems,
            notes: job.notes || ss.notes || '',
            completedDate: getTodayStr(),
          });
        }
        // Track this ID so sheet merge won't resurrect it (expires after 48h)
        const alreadyArchived = state.archivedJobIds.some(entry =>
          (typeof entry === 'object' ? entry.id : entry) === id
        );
        if (!alreadyArchived) {
          state.archivedJobIds.push({ id, ts: Date.now() });
        }
        state.scheduledJobs = state.scheduledJobs.filter(j => j.id !== id);
        delete state.stopStates[`oneoff_${id}`];
      });
      syncJobsToSheet();
      renderTabs();
    }
    saveState();

    btn.textContent = `✓ SAVED ${rows.length} JOB${rows.length>1?'S':''}`;
    btn.className = 'sync-btn success';
    showToast(`${rows.length} job${rows.length>1?'s':''} sent to Google Sheet!`);
    setTimeout(() => {
      btn.textContent = 'SAVE DAY';
      btn.className = 'sync-btn';
    }, 3000);

  } catch(err) {
    // Don't mark as synced on error — let them try again
    const savedRows = JSON.parse(localStorage.getItem('me_pending_rows') || '[]');
    savedRows.push(...rows.map(r => ({date: today, day, data: r})));
    localStorage.setItem('me_pending_rows', JSON.stringify(savedRows));

    btn.textContent = '✓ SAVED LOCALLY';
    btn.className = 'sync-btn success';
    showToast('Saved locally — check connection');
    setTimeout(() => {
      btn.textContent = 'SAVE DAY';
      btn.className = 'sync-btn';
    }, 3000);
  }
}

function clearSyncedFlags() {
  const day = state.activeDay;
  // Clear synced flag on all stop states for today
  Object.keys(state.stopStates).forEach(key => {
    if (state.stopStates[key].synced) {
      state.stopStates[key].synced = false;
    }
  });
  // Clear synced flag on monday entries
  state.mondayEntries.forEach(entry => { entry.synced = false; });
  saveState();
  showToast('↺ Ready to re-send — tap Save Day');
}

function hasSyncedItems(day) {
  if (day === 'Monday') {
    return state.mondayEntries.some(e => e.synced);
  }
  const stops = getStops(day);
  return stops.some((stop, idx) => {
    const ss = state.stopStates[stopKey(day, stop.name, idx)] || {};
    return ss.synced;
  });
}

function getDayOfWeek() {
  return new Date().toLocaleDateString('en-US', {month:'long'});
}
function getYear() {
  return new Date().getFullYear();
}

// ── Toast ─────────────────────────────────────────────────────────────────
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2200);
}

// ── Start ─────────────────────────────────────────────────────────────────
init();
</script>
